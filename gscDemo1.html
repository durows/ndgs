<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/data.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>
</head>
<body class="bg-slate-50 p-6 font-sans">

<div id="container" style="width:100%; height:400px; background-color: #f9f9f9; border: 1px solid #ddd;"></div>

<script>
Highcharts.chart('container', {
    data: {
        // REPLACE THIS URL with your "Published to Web" CSV link
        csvURL: 'https://docs.google.com/spreadsheets/dZZZ/e/2PACX-1vTFqdEKEmmi4Yk8Kss-rdj9tCkj6HwotiePO8XCdoSXQUGYkbmIvTQ3r1gSBSmOZ4TvlJgQ2A0cW3dN/pub?gid=1740055730&single=true&output=csv',
        enablePolling: false, // Refresh data every 60 seconds automatically
        dataRefreshRate: 60
    },
    chart: {
        type: 'column'
    },
    title: {
        text: 'Demo: web page and google sheet'
    },
    yAxis: {
        title: {
            text: 'Percent'
        }
    },
    plotOptions: {
        series: {
            color: '#005596' // You can match their brand colors here
        }
    }
});
</script>
</body>
</html>
